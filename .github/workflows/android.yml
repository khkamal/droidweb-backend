name: Android Emulator + ngrok

on:
  workflow_dispatch:

jobs:
  emulator:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Enable KVM
      run: |
        echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
        sudo udevadm control --reload-rules
        sudo udevadm trigger --name-match=kvm
        ls -la /dev/kvm

    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Install backend dependencies
      run: npm install

    - name: Install ngrok
      run: |
        curl -sSL https://ngrok-agent.s3.amazonaws.com/ngrok.asc \
          | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
        echo "deb https://ngrok-agent.s3.amazonaws.com buster main" \
          | sudo tee /etc/apt/sources.list.d/ngrok.list
        sudo apt-get update && sudo apt-get install -y ngrok

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install emulator packages
      run: |
        sdkmanager --install \
          "system-images;android-33;google_apis;x86_64" \
          "platforms;android-33" \
          "platform-tools" \
          "emulator"
        sdkmanager --list_installed

    - name: Create AVD
      run: |
        echo "no" | avdmanager create avd \
          -n droidweb_avd \
          -k "system-images;android-33;google_apis;x86_64" \
          --device "pixel_4" \
          --force
        avdmanager list avd

    - name: Start emulator
      run: |
        nohup $ANDROID_SDK_ROOT/emulator/emulator \
          -avd droidweb_avd \
          -no-window \
          -no-audio \
          -no-boot-anim \
          -gpu swiftshader_indirect \
          -memory 4096 \
          -cores 2 \
          -no-snapshot \
          -no-accel \
          &>/tmp/emulator.log &
        echo "Emulator PID: $!"

    - name: Wait for emulator (up to 15 min)
      run: |
        echo "Waiting for emulator to appear on ADB..."
        for i in $(seq 1 180); do
          DEVICES=$(adb devices 2>/dev/null)
          echo "[$i] ADB devices: $DEVICES"
          if echo "$DEVICES" | grep -q "emulator"; then
            echo "✅ Emulator found on ADB!"
            break
          fi
          sleep 5
        done

        echo "Waiting for Android to fully boot..."
        for i in $(seq 1 180); do
          BOOT=$(adb -s emulator-5554 shell getprop sys.boot_completed 2>/dev/null | tr -d '\r\n')
          echo "[$i] Boot status: '$BOOT'"
          if [ "$BOOT" = "1" ]; then
            echo "✅ Android fully booted!"
            break
          fi
          sleep 5
        done

        adb shell input keyevent 82 2>/dev/null || true
        adb shell input keyevent 4  2>/dev/null || true
        echo "Final ADB devices:"
        adb devices

    - name: Show emulator log if failed
      if: failure()
      run: cat /tmp/emulator.log || true

    - name: Start Node.js backend
      run: |
        nohup node src/index.js &>/tmp/node.log &
        sleep 4
        curl -s http://localhost:3000/api/status && echo "" || echo "Node starting..."

    - name: Start ngrok
      env:
        NGROK_AUTHTOKEN: ${{ secrets.NGROK_TOKEN }}
      run: |
        ngrok config add-authtoken $NGROK_AUTHTOKEN
        nohup ngrok http 3000 &>/tmp/ngrok.log &
        sleep 6

    - name: Print public URL
      run: |
        URL=$(curl -s http://localhost:4040/api/tunnels | python3 -c "import sys,json; print(json.load(sys.stdin)['tunnels'][0]['public_url'])")
        echo ""
        echo "========================================"
        echo "  ✅ ANDROID EMULATOR IS LIVE!"
        echo "  🌐 URL: $URL"
        echo "  👉 Paste into droidweb.vercel.app"
        echo "========================================"

    - name: Keep alive
      run: |
        for i in $(seq 1 360); do
          sleep 60
          URL=$(curl -s http://localhost:4040/api/tunnels 2>/dev/null | python3 -c "import sys,json; print(json.load(sys.stdin)['tunnels'][0]['public_url'])" 2>/dev/null || echo "reconnecting")
          BOOT=$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r' || echo "?")
          echo "[${i}min] Android:$BOOT | URL:$URL"
        done
